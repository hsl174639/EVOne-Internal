{% extends "base.html" %}

{% block content %}
<div class="container mx-auto p-6 max-w-6xl">
    
    <div class="flex space-x-4 mb-8 border-b border-gray-200">
        <button onclick="switchTab('create')" id="tab-create-btn" class="py-2 px-4 font-bold border-b-2 border-indigo-600 text-indigo-600 transition-all">
            Create Workflow
        </button>
        <button onclick="switchTab('trace')" id="tab-trace-btn" class="py-2 px-4 font-bold text-gray-500 hover:text-indigo-600 transition-all">
            Trace & Sync
        </button>
    </div>

    <div id="tab-create" class="block">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">New Signature Request</h2>
        <form id="signForm" class="space-y-6 bg-white p-6 shadow-lg rounded-xl border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Category</label>
                    <select id="category" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500">
                        <option value="Internal">Internal</option>
                        <option value="External">External</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Form Type</label>
                    <select id="form_type" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500" onchange="updateSignerOptions()">
                        <option value="Form A">Form A</option>
                        <option value="Form D">Form D</option>
                        <option value="Form 1">Form 1</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Signers</label>
                    <select id="signers_count" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500" onchange="toggleInputs()"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Form Name</label>
                    <input type="text" id="prefix" class="w-full border border-gray-300 p-2.5 rounded-lg focus:ring-2 focus:ring-indigo-500" placeholder="e.g. Project Alpha" required>
                </div>
            </div>

            <div class="space-y-4 pt-4">
                <fieldset id="section_1" class="border border-gray-200 p-4 rounded-lg bg-gray-50">
                    <legend class="text-xs font-bold uppercase tracking-wider text-gray-600 px-2 bg-white">First Party</legend>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <input type="text" id="name_1" class="border border-gray-300 p-2 rounded-md text-sm" placeholder="Name" required>
                        <input type="email" id="email_1" class="border border-gray-300 p-2 rounded-md text-sm" placeholder="Email" required>
                    </div>
                </fieldset>

                <fieldset id="section_2" class="border border-blue-200 p-4 rounded-lg bg-blue-50/30">
                    <legend class="text-xs font-bold uppercase tracking-wider text-blue-700 px-2 bg-white">Second Party</legend>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <input type="text" id="name_2" class="border border-blue-300 p-2 rounded-md text-sm" placeholder="Name">
                        <input type="email" id="email_2" class="border border-blue-300 p-2 rounded-md text-sm" placeholder="Email">
                    </div>
                </fieldset>

                <fieldset id="section_3" class="border border-green-200 p-4 rounded-lg bg-green-50/30">
                    <legend class="text-xs font-bold uppercase tracking-wider text-green-700 px-2 bg-white">Third Party</legend>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <input type="text" id="name_3" class="border border-green-300 p-2 rounded-md text-sm" placeholder="Name">
                        <input type="email" id="email_3" class="border border-green-300 p-2 rounded-md text-sm" placeholder="Email">
                    </div>
                </fieldset>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-md">
                Launch Workflow
            </button>
        </form>
    </div>

    <div id="tab-trace" class="hidden">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-2xl font-bold text-gray-800">Submission Trace</h2>
            <button onclick="fetchSubmissionsFromAPI()" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-4 py-2 rounded-lg text-sm font-bold transition">
                Refresh Data
            </button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <input type="text" id="filter_search" oninput="applyFilters()" placeholder="Search Document Name..." class="w-full border border-gray-300 p-2 rounded-md focus:ring-indigo-500 text-sm">
            </div>
            <div class="w-full md:w-48">
                <select id="filter_category" onchange="applyFilters()" class="w-full border border-gray-300 p-2 rounded-md text-sm focus:ring-indigo-500">
                    <option value="All">All Categories</option>
                    <option value="Internal">Internal Only</option>
                    <option value="External">External Only</option>
                </select>
            </div>
            <div class="w-full md:w-48">
                <select id="filter_form" onchange="applyFilters()" class="w-full border border-gray-300 p-2 rounded-md text-sm focus:ring-indigo-500">
                    <option value="All">All Forms</option>
                    <option value="Form A">Form A</option>
                    <option value="Form D">Form D</option>
                    <option value="Form 1">Form 1</option>
                </select>
            </div>
        </div>

        <div class="bg-white shadow-lg rounded-xl overflow-hidden border border-gray-100">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Document Name</th>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase">Date</th>
                        <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase">Action</th>
                    </tr>
                </thead>
                <tbody id="submissionList" class="divide-y divide-gray-200 text-sm">
                    <tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Global state for filtering
let globalSubmissions = [];

async function getAuthHeaders() {
    let token = null;
    for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key.startsWith('sb-') && key.endsWith('-auth-token')) {
            try { token = JSON.parse(localStorage.getItem(key)).access_token; break; } catch (e) {}
        }
    }
    if (!token) token = localStorage.getItem('supabase.auth.token') || localStorage.getItem('sb-access-token');
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
}

function switchTab(tab) {
    const createTab = document.getElementById('tab-create');
    const traceTab = document.getElementById('tab-trace');
    const createBtn = document.getElementById('tab-create-btn');
    const traceBtn = document.getElementById('tab-trace-btn');

    if (tab === 'create') {
        createTab.classList.replace('hidden', 'block');
        traceTab.classList.replace('block', 'hidden');
        createBtn.classList.add('border-indigo-600', 'text-indigo-600');
        traceBtn.classList.remove('border-indigo-600', 'text-indigo-600');
    } else {
        traceTab.classList.replace('hidden', 'block');
        createTab.classList.replace('block', 'hidden');
        traceBtn.classList.add('border-indigo-600', 'text-indigo-600');
        createBtn.classList.remove('border-indigo-600', 'text-indigo-600');
        // Fetch fresh data when switching to trace
        fetchSubmissionsFromAPI();
    }
}

function updateSignerOptions() {
    const formType = document.getElementById('form_type').value;
    const countSelect = document.getElementById('signers_count');
    countSelect.innerHTML = '';
    
    if (formType === 'Form A') {
        countSelect.add(new Option('1 Person (First Party)', '1'));
        countSelect.add(new Option('2 People (First + Second Party)', '2'));
    } else {
        countSelect.add(new Option('2 People (First + Second Party)', '2'));
        countSelect.add(new Option('3 People (First + Second + Third Party)', '3'));
    }
    toggleInputs();
}

function toggleInputs() {
    const count = parseInt(document.getElementById('signers_count').value);
    const show = (id, isVisible) => {
        const el = document.getElementById(id);
        el.style.display = isVisible ? 'block' : 'none';
        el.querySelectorAll('input').forEach(i => isVisible ? i.setAttribute('required', 'required') : i.removeAttribute('required'));
    };
    show('section_1', count >= 1);
    show('section_2', count >= 2);
    show('section_3', count >= 3);
}

// --- Data Fetch & Filter Logic ---

async function fetchSubmissionsFromAPI() {
    const tbody = document.getElementById('submissionList');
    tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-gray-500">Fetching data...</td></tr>`;
    
    const headers = await getAuthHeaders();
    try {
        const res = await fetch('/api/get-signing-submissions?t=' + new Date().getTime(), { headers });
        const rawData = await res.json();
        globalSubmissions = Array.isArray(rawData) ? rawData : (rawData.data || []);
        applyFilters(); // Apply current filters immediately
    } catch(e) { 
        console.error(e);
        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-red-500">Network Error.</td></tr>`;
    }
}

function applyFilters() {
    const searchText = document.getElementById('filter_search').value.toLowerCase();
    const catFilter = document.getElementById('filter_category').value;
    const formFilter = document.getElementById('filter_form').value;

    const filteredData = globalSubmissions.filter(item => {
        const docName = item.name || '';
        const nameLower = docName.toLowerCase();

        // 1. Text Search Filter
        if (searchText && !nameLower.includes(searchText)) return false;

        // 2. Category Filter (Check for [Internal] or [External])
        if (catFilter !== 'All') {
            if (!docName.includes(`[${catFilter}]`)) return false;
        }

        // 3. Form Type Filter
        if (formFilter !== 'All') {
            if (!docName.includes(formFilter)) return false;
        }

        return true;
    });

    renderTable(filteredData);
}

function renderTable(dataArray) {
    const tbody = document.getElementById('submissionList');
    tbody.innerHTML = '';
    
    if(dataArray.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" class="px-6 py-10 text-center text-gray-400">No matching documents found.</td></tr>`;
        return;
    }

    dataArray.forEach(item => {
        const statusColor = item.status === 'completed' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700';
        const rawName = item.name || 'Unnamed Document';
        
        // 提取类别，以渲染漂亮的徽章 (Badge)
        let badgeHTML = '';
        let cleanName = rawName;
        if (rawName.includes('[Internal]')) {
            badgeHTML = `<span class="bg-purple-100 text-purple-700 px-2 py-0.5 rounded text-xs font-bold mr-2">Internal</span>`;
            cleanName = rawName.replace('[Internal]', '').trim();
        } else if (rawName.includes('[External]')) {
            badgeHTML = `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs font-bold mr-2">External</span>`;
            cleanName = rawName.replace('[External]', '').trim();
        }

        tbody.innerHTML += `
            <tr class="hover:bg-gray-50 transition">
                <td class="px-6 py-4 font-medium text-gray-900 flex items-center">${badgeHTML} ${cleanName}</td>
                <td class="px-6 py-4"><span class="px-2.5 py-0.5 rounded-full text-xs font-bold ${statusColor}">${(item.status || 'unknown').toUpperCase()}</span></td>
                <td class="px-6 py-4 text-gray-500 text-sm">${item.created_at ? new Date(item.created_at).toLocaleDateString() : '-'}</td>
                <td class="px-6 py-4 text-right">
                    <button onclick="downloadAndSync('${item.id}')" class="text-indigo-600 hover:text-indigo-900 font-bold transition">Sync & View</button>
                </td>
            </tr>`;
    });
}

// --- Sync & Form Submit ---

async function downloadAndSync(subId) {
    const headers = await getAuthHeaders();
    const res = await fetch(`/api/get-document-download/${subId}`, { headers });
    const result = await res.json();
    if (result.download_url) {
        window.open(result.download_url, '_blank');
        alert('Document Synced to Supabase Storage Successfully.');
    } else { alert('Error: ' + (result.message || 'Processing...')); }
}

document.getElementById('signForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const headers = await getAuthHeaders();
    
    const count = document.getElementById('signers_count').value;
    
    // Add category to payload
    const payload = {
        category: document.getElementById('category').value,
        form_type: document.getElementById('form_type').value,
        signers_count: count,
        prefix: document.getElementById('prefix').value,
        name_inspector: '', email_inspector: '',
        name_es: '', email_es: '',
        name_lew: '', email_lew: ''
    };

    const n1 = document.getElementById('name_1').value;
    const e1 = document.getElementById('email_1').value;
    const n2 = document.getElementById('name_2').value;
    const e2 = document.getElementById('email_2').value;
    const n3 = document.getElementById('name_3').value;
    const e3 = document.getElementById('email_3').value;

    if (count === '1') {
        payload.name_es = n1; payload.email_es = e1;
    } else if (count === '2') {
        payload.name_es = n1; payload.email_es = e1;
        payload.name_lew = n2; payload.email_lew = e2;
    } else if (count === '3') {
        payload.name_inspector = n1; payload.email_inspector = e1;
        payload.name_es = n2; payload.email_es = e2;
        payload.name_lew = n3; payload.email_lew = e3;
    }

    try {
        const res = await fetch('/api/create-signature', { method: 'POST', headers, body: JSON.stringify(payload) });
        const result = await res.json();
        if (!result.error) {
            alert('Workflow Successfully Created!');
            document.getElementById('signForm').reset();
            updateSignerOptions();
        } else { alert('Submission Failed: ' + result.message); }
    } catch (err) { alert('Network or server error during submission.'); }
});

updateSignerOptions();
</script>
{% endblock %}
